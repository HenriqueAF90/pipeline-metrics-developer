services:
  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,dynamodb
    volumes:
      - ./infra/localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  processor:
    build: ./services/processor
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_REGION=us-east-1
      - SQS_ENDPOINT=http://localstack:4566
      - RAW_QUEUE_URL=http://localstack:4566/000000000000/raw-events
      - PROCESSED_QUEUE_URL=http://localstack:4566/000000000000/processed-events
      - WORKER_COUNT=5
      - PROCESSOR_ID=processor-1
    restart: on-failure

  aggregator:
    build: ./services/aggregator
    ports:
      - "8080:8080"
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_REGION=us-east-1
      - SQS_ENDPOINT=http://localstack:4566
      - DYNAMODB_ENDPOINT=http://localstack:4566
      - PROCESSED_QUEUE_URL=http://localstack:4566/000000000000/processed-events
      - WORKER_COUNT=3
      - API_PORT=8080
      - EVENTS_TABLE=events
      - SUMMARY_TABLE=developer_summary
    restart: on-failure
